# SPDX-License-Identifier: Apache-2.0 OR MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate HTML + inline JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: index.html present
        run: test -f index.html && echo "ok"
      - name: Syntax-check inline JavaScript
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('index.html','utf8');const m=h.match(/<script>([\s\S]*?)<\/script>/);if(!m){console.error('no inline script found');process.exit(1);}fs.writeFileSync('/tmp/game.js',m[1]);"
          node --check /tmp/game.js
          echo "inline JS syntax OK"
