# SPDX-License-Identifier: Apache-2.0 OR MIT

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate AxonOS Evolver v12.1.0
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate package
        run: |
          python3 scripts/validate_v12_1_0.py

      - name: Verify release version
        run: |
          grep -q "v12.1.0" README.md
          grep -q "v12.1.0" evolver-evolution-version/README.md
          grep -q "v12.1.0-evolver" evolver-evolution-version/VERSION
          grep -q "v12.1.0" evolver-evolution-version/index.html
