# SPDX-License-Identifier: Apache-2.0 OR MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Become the Brain OS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Extract inline script and syntax-check
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('index.html','utf8');const m=h.match(/<script>([\s\S]*?)<\/script>/);if(!m){console.error('no inline script');process.exit(1);}fs.writeFileSync('game.js',m[1]);"
          node --check game.js
      - name: Assert core invariants
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('index.html','utf8');const need=['v14.2.0','no neural data','axonos.org','Become the Brain OS'];for(const s of need){if(!h.includes(s)){console.error('missing invariant: '+s);process.exit(1);}}console.log('invariants ok');"
