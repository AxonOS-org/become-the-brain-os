# SPDX-License-Identifier: Apache-2.0 OR MIT

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Become the Brain OS Evolver v9.3.6
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Required files
        run: |
          test -f README.md
          test -f index.html
          test -f evolver-evolution-version/index.html
          test -f evolver-evolution-version/README.md
          test -f evolver-evolution-version/VERSION
          test -f scripts/validate_v9_3_6.py
          echo "required files ok"

      - name: Validate package
        run: |
          python3 scripts/validate_v9_3_6.py
